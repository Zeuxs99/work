<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
</head>

<body style="background-color: rgb(60, 137, 204); font-family: Arial; text-align:center;">

    <h1>You will not get until you try</h1>
    <p>Start typing your note below</p>

    <textarea id="note" style="width:80%; height:200px;"></textarea>

    <div style="margin-top:15px;">
        <button id="open">Open</button>
        <!-- NEW -->
        <button id="save">Save</button>
        <button id="save-as">Save As</button>
        <button id="new-note">New</button>
    </div>

    <p id="save_status"></p>

    <script src="renderer.js"></script>
</body>

</html>
